name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make mvnw executable
        run: chmod +x email-writer-sb/mvnw

      - name: Compile
        run: cd email-writer-sb && ./mvnw compile --no-transfer-progress

      - name: Run Tests
        run: cd email-writer-sb && ./mvnw test --no-transfer-progress
        env:
          GEMINI_API_URL: http://dummy-url-for-ci
          GEMINI_API_KEY: dummy-key-for-ci

      - name: Build JAR
        run: cd email-writer-sb && ./mvnw package -DskipTests --no-transfer-progress

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-reply-generator
          path: email-writer-sb/target/*.jar
          retention-days: 7

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          cd email-writer-sb
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/email-reply-generator:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/email-reply-generator:${{ github.sha }} \
            .

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/email-reply-generator:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/email-reply-generator:${{ github.sha }}
